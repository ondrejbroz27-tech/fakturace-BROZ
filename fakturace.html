const calcDPH = (zakladBezDPH, sazba) => {
    const dph = zakladBezDPH * (sazba / 100);
    return {
        zaklad: zakladBezDPH,
        dph: Math.round(dph * 100) / 100,
        celkem: Math.round((zakladBezDPH + dph) * 100) / 100,
    };
};
const calcFakturaTotal = (polozky) => {
    const groups = {};
    polozky.forEach((p) => {
        const sazba = p.sazba || 21;
        if (!groups[sazba])
            groups[sazba] = { zaklad: 0, dph: 0 };
        const zaklad = p.mnozstvi * p.cena;
        const dph = zaklad * (sazba / 100);
        groups[sazba].zaklad += zaklad;
        groups[sazba].dph += dph;
    });
    let totalZaklad = 0, totalDPH = 0;
    Object.values(groups).forEach((g) => {
        totalZaklad += g.zaklad;
        totalDPH += g.dph;
    });
    return {
        groups,
        zaklad: Math.round(totalZaklad * 100) / 100,
        dph: Math.round(totalDPH * 100) / 100,
        celkem: Math.round((totalZaklad + totalDPH) * 100) / 100,
    };
};
const calcDPHHlaseni = (faktury, rok, kvartal) => {
    const mesice = kvartal === 1 ? [1, 2, 3] : kvartal === 2 ? [4, 5, 6] : kvartal === 3 ? [7, 8, 9] : [10, 11, 12];
    const relevantni = faktury.filter((f) => {
        const d = new Date(f.datumVystaveni);
        return d.getFullYear() === rok && mesice.includes(d.getMonth() + 1);
    });
    const result = { zaklad21: 0, dph21: 0, zaklad12: 0, dph12: 0, zaklad0: 0, celkemOdvod: 0, faktury: relevantni };
    relevantni.forEach((f) => {
        const total = calcFakturaTotal(f.polozky || []);
        Object.entries(total.groups).forEach(([sazba, g]) => {
            if (Number(sazba) === 21) {
                result.zaklad21 += g.zaklad;
                result.dph21 += g.dph;
            }
            else if (Number(sazba) === 12) {
                result.zaklad12 += g.zaklad;
                result.dph12 += g.dph;
            }
            else {
                result.zaklad0 += g.zaklad;
            }
        });
    });
    result.celkemOdvod = Math.round((result.dph21 + result.dph12) * 100) / 100;
    return result;
};

const ODPIS_SKUPINY = {
    5: { roky: 30, rovnomerna1: 1.4, rovnomernaD: 3.4, zrychlena1: 30 },
    6: { roky: 50, rovnomerna1: 1.2, rovnomernaD: 2.0, zrychlena1: 50 },
};

function calcRocniOdpis(cena, skupina, metodaOdpisu, rokZahajeni, rokVypoctu) {
    const sk = ODPIS_SKUPINY[skupina] || ODPIS_SKUPINY[5];
    const rokOdpisovani = rokVypoctu - rokZahajeni + 1; // kolikátý rok odpisu
    if (rokOdpisovani < 1 || rokOdpisovani > sk.roky) return 0;
    if (metodaOdpisu === "rovnomerna") {
        // §31: 1. rok nižší sazba, další roky vyšší sazba
        const sazba = rokOdpisovani === 1 ? sk.rovnomerna1 : sk.rovnomernaD;
        return Math.floor(cena * sazba / 100);
    } else {
        // §32 zrychlená: 1. rok cena/k, další roky 2*ZC/(k-n+1)
        // k = koeficient (30 nebo 50), n = počet let odpisování
        const k = sk.zrychlena1;
        if (rokOdpisovani === 1) {
            return Math.floor(cena / k);
        } else {
            // Zůstatková cena po předchozích odpisech
            let zc = cena;
            let odpis1 = Math.floor(cena / k);
            zc -= odpis1;
            for (let i = 2; i < rokOdpisovani; i++) {
                const o = Math.floor(2 * zc / (k - i + 2));
                zc -= o;
            }
            return Math.floor(2 * zc / (k - rokOdpisovani + 2));
        }
    }
}

function calcZustatkovaCena(cena, skupina, metodaOdpisu, rokZahajeni, rokVypoctu) {
    const sk = ODPIS_SKUPINY[skupina] || ODPIS_SKUPINY[5];
    let zc = cena;
    const rokOdpisovani = rokVypoctu - rokZahajeni + 1;
    const rokyOdepsano = Math.min(rokOdpisovani - 1, sk.roky);
    for (let i = 1; i <= rokyOdepsano; i++) {
        zc -= calcRocniOdpis(cena, skupina, metodaOdpisu, rokZahajeni, rokZahajeni + i - 1);
    }
    return Math.max(0, zc);
}

async function callGemini(prompt, imageBase64, mimeType) {
    const key = getGeminiKey();

    const parts = [{ text: prompt }];

    }
    const resp = await fetch(GEMINI_URL(key), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts }] })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);

    return JSON.parse(text);
}

function padNum(n, len) {
    return String(n).padStart(len, "0");
}

function xmlDate(dateStr) {
    if (!dateStr) return "";

}

function roundXml(n) {

}

// Daňové přiznání k DPH — dle vzoru EPO DPHDP3
function generateDPXml(data, rok, kvartal, hlaseni, prijateDphOdpocet, prijateFaktury) {
    const firma = data.firma || {};
    // DIČ — pouze číselná část bez prefixu CZ (vzor [0-9]{1,10})
    const dicCislo = (firma.dic || "").replace(/\s/g,"").replace(/^CZ/i,"").replace(/[^0-9]/g,"");
    const cufo = (firma.c_ufo || "1").replace(/[^0-9]/g,"") || "1";
    // Formát datumu DD.MM.RRRR dle XSD dateInMultiFormat
    const fmtDate = (d) => padNum(d.getDate(),2)+"."+padNum(d.getMonth()+1,2)+"."+d.getFullYear();
    const dnes = fmtDate(new Date());

    // Výstup — uskutečněná zdanitelná plnění (ř.1 = 21%, ř.2 = 12%)
    const obrat23 = Math.round(hlaseni.zaklad21);
    const dan23   = Math.round(hlaseni.dph21);
    const obrat5  = Math.round(hlaseni.zaklad12);
    const dan5    = Math.round(hlaseni.dph12);

    // Vstup — přijatá zdanitelná plnění (ř.40 = 21%, ř.41 = 12%)
    // od_zdp = základ, nar_zdp = nárok na odpočet (DPH)
    const prijate21 = prijateFaktury.filter(f => (f.sazba||21) === 21);
    const prijate12 = prijateFaktury.filter(f => (f.sazba||21) === 12);
    const od_zdp23  = Math.round(prijate21.reduce((s,f) => s+(f.castka||0), 0));
    const nar_zdp23 = Math.round(prijate21.reduce((s,f) => s+(f.dph||0), 0));
    const od_zdp5   = Math.round(prijate12.reduce((s,f) => s+(f.castka||0), 0));
    const nar_zdp5  = Math.round(prijate12.reduce((s,f) => s+(f.dph||0), 0));

    const nazev = (firma.nazev||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").substring(0,255);

    return `<?xml version="1.0" encoding="UTF-8"?>
<Pisemnost nazevSW="FakturaceBROZ" verzeSW="1.0">
  <DPHDP3>
    <VetaD
      d_poddp="${dnes}"
      ctvrt="${kvartal}"
      rok="${rok}"
      typ_platce="P"
      dapdph_forma="B"
      dokument="DP3"
      k_uladis="DPH"
    />
    <VetaP
      c_ufo="${cufo}"
      dic="${dicCislo}"
      zkrobchjm="${nazev}"
      typ_ds="F"
    />
    <Veta1
      obrat23="${roundXml(obrat23)}"
      dan23="${roundXml(dan23)}"
      obrat5="${roundXml(obrat5)}"
      dan5="${roundXml(dan5)}"
    />
    <Veta4
      od_zdp23="${roundXml(od_zdp23)}"
      nar_zdp23="${roundXml(nar_zdp23)}"
      od_zdp5="${roundXml(od_zdp5)}"
      nar_zdp5="${roundXml(nar_zdp5)}"
    />
  </DPHDP3>
</Pisemnost>`;
}

// Kontrolní hlášení DPH — dle schématu DPHKH1
function generateKHXml(data, rok, kvartal, hlaseni, prijateFaktury) {
    const firma = data.firma || {};
    const dicCislo = (firma.dic || "").replace(/\s/g,"").replace(/^CZ/i,"").replace(/[^0-9]/g,"");
    const cufo = (firma.c_ufo || "1").replace(/[^0-9]/g,"") || "1";
    const nazev = (firma.nazev||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").substring(0,255);
    // Formát datumu DD.MM.RRRR
    const fmtDate = (d) => padNum(d.getDate(),2)+"."+padNum(d.getMonth()+1,2)+"."+d.getFullYear();
    const dnes = fmtDate(new Date());

    // Helper: z DIČ "CZ12345678" nebo "12345678" → jen číslice
    const dicNum = (dic) => (dic||"").replace(/\s/g,"").replace(/^CZ/i,"").replace(/[^0-9]/g,"");
    // Helper: z čísla faktury vyextrahuj číselnout část pro c_evid_dd (max 60 znaků)
    // c_evid_dd = pouze číslice z čísla faktury (např. FV20260001 → 20260001)
    // c_evid_dd musí být POUZE číslice (FV20260001 → 20260001)
    const evCislo = (cislo) => (cislo||"").replace(/[^0-9]/g,"").substring(0,20) || "0";

    // A4 — vydané faktury nad 10 000 Kč základ (§ 100 odst. 1 DPH)
    const vydaneFaktury = hlaseni.faktury;
    const a4Faktury = vydaneFaktury.filter(f => {
        const t = calcFakturaTotal(f.polozky||[]);
        return t.zaklad >= 10000;
    });
    const a5Faktury = vydaneFaktury.filter(f => {
        const t = calcFakturaTotal(f.polozky||[]);
        return t.zaklad < 10000;
    });

    // A5 souhrnné hodnoty
    const a5z1 = a5Faktury.reduce((s,f)=>{ const t=calcFakturaTotal(f.polozky||[]); return s+((t.groups[21]||{}).zaklad||0); },0);
    const a5d1 = a5Faktury.reduce((s,f)=>{ const t=calcFakturaTotal(f.polozky||[]); return s+((t.groups[21]||{}).dph||0); },0);
    const a5z2 = a5Faktury.reduce((s,f)=>{ const t=calcFakturaTotal(f.polozky||[]); return s+((t.groups[12]||{}).zaklad||0); },0);
    const a5d2 = a5Faktury.reduce((s,f)=>{ const t=calcFakturaTotal(f.polozky||[]); return s+((t.groups[12]||{}).dph||0); },0);

    // B2 — přijaté faktury nad 10 000 Kč základ
    const b2Faktury = prijateFaktury.filter(f => (f.castka||0) >= 10000);
    const b3Faktury = prijateFaktury.filter(f => (f.castka||0) < 10000);
    const b3z1 = Math.round(b3Faktury.filter(f=>(f.sazba||21)===21).reduce((s,f)=>s+(f.castka||0),0));
    const b3d1 = Math.round(b3Faktury.filter(f=>(f.sazba||21)===21).reduce((s,f)=>s+(f.dph||0),0));
    const b3z2 = Math.round(b3Faktury.filter(f=>(f.sazba||21)===12).reduce((s,f)=>s+(f.castka||0),0));
    const b3d2 = Math.round(b3Faktury.filter(f=>(f.sazba||21)===12).reduce((s,f)=>s+(f.dph||0),0));

    // Generuj řádky A4 — každá faktura zvlášť
    const a4Rows = a4Faktury.map((f, i) => {
        const t = calcFakturaTotal(f.polozky||[]);
        const g21 = t.groups[21]||{zaklad:0,dph:0};
        const g12 = t.groups[12]||{zaklad:0,dph:0};
        // dppd = datum povinnosti přiznat daň = DUZP nebo datum vystavení
        const dppd = fmtDate(new Date(f.datumUskutecneni||f.datumVystaveni));
        // dic_odb = DIČ odběratele - z faktury nebo fallback z databáze zákazníků
        const zak = (data.zakaznici||[]).find(z => z.id === f.zakaznikId);
        const dicOdb = dicNum(f.zakaznikDic || (zak && zak.dic) || "");
        const ev = evCislo(f.cislo);
        return `    <VetaA4 c_radku="${i+1}" dic_odb="${dicOdb}" c_evid_dd="${ev}" dppd="${dppd}" zakl_dane1="${roundXml(g21.zaklad)}" dan1="${roundXml(g21.dph)}" zakl_dane2="${roundXml(g12.zaklad)}" dan2="${roundXml(g12.dph)}" kod_pred_pl="1" krp="0" onp="N"/>`;
    }).join("\n");

    // Generuj řádky B2
    const b2Rows = b2Faktury.map((f, i) => {
        const sazba = f.sazba||21;
        const dppd = fmtDate(new Date(f.datumUskutecneni||f.datumPrijeti));
        const dicDod = dicNum(f.dodavatelDic||f.dodavatelIco||"");
        const ev = evCislo(f.cislo||f.id);
        const z1 = sazba===21 ? roundXml(f.castka||0) : "0";
        const d1 = sazba===21 ? roundXml(f.dph||0) : "0";
        const z2 = sazba===12 ? roundXml(f.castka||0) : "0";
        const d2 = sazba===12 ? roundXml(f.dph||0) : "0";
        return `    <VetaB2 c_radku="${i+1}" dic_dod="${dicDod}" c_evid_dd="${ev}" dppd="${dppd}" zakl_dane1="${z1}" dan1="${d1}" zakl_dane2="${z2}" dan2="${d2}" krp="0" onp="N"/>`;
    }).join("\n");

    return `<?xml version="1.0" encoding="UTF-8"?>
<Pisemnost nazevSW="FakturaceBROZ" verzeSW="1.0">
  <DPHKH1>
    <VetaD
      d_poddp="${dnes}"
      ctvrt="${kvartal}"
      rok="${rok}"
      khdph_forma="B"
      dokument="KH1"
      k_uladis="DPH"
    />
    <VetaP
      c_ufo="${cufo}"
      dic="${dicCislo}"
      zkrobchjm="${nazev}"
      typ_ds="F"
    />
${a4Rows}
    <VetaA5 zakl_dane1="${roundXml(Math.round(a5z1))}" dan1="${roundXml(Math.round(a5d1))}" zakl_dane2="${roundXml(Math.round(a5z2))}" dan2="${roundXml(Math.round(a5d2))}"/>
${b2Rows}
    <VetaB3 zakl_dane1="${b3z1}" dan1="${b3d1}" zakl_dane2="${b3z2}" dan2="${b3d2}"/>
  </DPHKH1>
</Pisemnost>`;
}

function downloadXml(content, filename) {
    const blob = new Blob([content], { type: "application/xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

      message: parts[8] || '',
      comment: parts[9] || '',
      type: parts[10] || '',
    });
  }
  
  return transactions;
}

// Calculate interest on overdue invoice
function calculateInterest(amount, daysOverdue) {
  const yearlyRate = 0.15; // 15% ročně
  const dailyRate = yearlyRate / 365;
  return Math.round(amount * dailyRate * daysOverdue * 100) / 100;
}

// Get reminder level for invoice
function getInvoiceReminderLevel(invoice, upominky) {
  // IMPORTANT: Check invoice status - respect ALL payment methods
  // - Bank transfer (auto-matched from Fio/AI)
  // - Manual status change (cash payment, card payment, etc.)
  if (invoice.stav !== 'vystavena') {
    return null; // Invoice is paid (uhrazena) or cancelled (stornována)
  }
  
  const daysOverdue = Math.floor((new Date() - new Date(invoice.datumSplatnosti)) / (1000 * 60 * 60 * 24));
  if (daysOverdue < 1) return null; // Not overdue yet
  
  const sentReminders = (upominky || []).filter(u => 
    u.type === 'invoice' && u.invoiceId === invoice.id
  ).sort((a, b) => new Date(b.date) - new Date(a.date));
  
  if (sentReminders.length === 0) {
    return daysOverdue >= 7 ? 1 : null; // 1. upomínka po 7 dnech
  }
  
  const lastReminder = sentReminders[0];
  const daysSinceLastReminder = Math.floor((new Date() - new Date(lastReminder.date)) / (1000 * 60 * 60 * 24));
  
  if (lastReminder.level === 1 && daysSinceLastReminder >= 14) {
    return 2; // 2. upomínka 14 dní po první
  }
  
  if (lastReminder.level === 2 && daysSinceLastReminder >= 14) {
    return 3; // Předžalobní výzva 14 dní po druhé
  }
  
  return null;
}

// Get reminder level for rental
function getRentalReminderLevel(najemnik, platby, upominky) {
  const currentMonth = new Date().toISOString().slice(0, 7);
  const currentDay = new Date().getDate();
  
  // Check if rent was paid this month
  const paidThisMonth = (platby || []).some(p => 
    p.type === 'rental' && p.rentalId === najemnik.id && p.month === currentMonth
  );
  
  if (paidThisMonth) return null;
  
  const dueDay = najemnik.terminSplatnosti || 5;
  const tolerance = najemnik.toleranceDni || 3;
  const daysOverdue = currentDay - dueDay - tolerance;
  
  if (daysOverdue < 1) return null;
  
  // Check sent reminders
  const sentReminders = (upominky || []).filter(u => 
    u.type === 'rental' && u.rentalId === najemnik.id && u.month === currentMonth
  ).sort((a, b) => new Date(b.date) - new Date(a.date));
  
  if (sentReminders.length === 0) {
    return 1; // První upomínka
  }
  
  const lastReminder = sentReminders[0];
  const daysSinceLastReminder = Math.floor((new Date() - new Date(lastReminder.date)) / (1000 * 60 * 60 * 24));
  
  if (lastReminder.level === 1 && daysSinceLastReminder >= 7) {
    return 2; // Druhá upomínka
  }
  
  if (lastReminder.level === 2 && daysSinceLastReminder >= 14) {
    return 3; // Upomínka před výpovědí
  }
  
  return null;
}

function isGmailConnected() {
  return window.gapi && window.gapi.client && window.gapi.client.getToken && window.gapi.client.getToken();
}

async function sendGmailEmail(to, subject, body) {
  if (!isGmailConnected()) {
    throw new Error('Google Drive není připojen');
  }
  
  // Encode subject with MIME encoded-word for Czech characters
  const encodedSubject = '=?UTF-8?B?' + btoa(unescape(encodeURIComponent(subject))) + '?=';
  
  const email = [
    'To: ' + to,
    'Subject: ' + encodedSubject,
    'Content-Type: text/plain; charset=utf-8',
    '',
    body
  ].join('\r\n');
  
  const encodedEmail = btoa(unescape(encodeURIComponent(email))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const response = await window.gapi.client.gmail.users.messages.send({ userId: 'me', resource: { raw: encodedEmail } });
  return response.result;
}

// Substitute variables in email template
function substituteEmailVariables(template, data) {
  let result = template;
  Object.keys(data).forEach(key => {
    const placeholder = `{${key}}`;
    result = result.split(placeholder).join(data[key] || '');
  });
  return result;
}

async function analyzeBankStatement(file) {

function matchPaymentToInvoiceOrRent(payment, invoices, rentals) {
  const matches = [];
  
  // 1. Match to INVOICE by Variable Symbol
  if (payment.variableSymbol) {
    const invoice = invoices.find(inv => {
      if (!inv.cislo) return false;
      const invNum = inv.cislo.replace(/\D/g, '');
      const payVS = payment.variableSymbol.replace(/\D/g, '');
      return invNum === payVS;
    });
    
    if (invoice) {
      const total = calcFakturaTotal(invoice.polozky || []).celkem;
      const confidence = Math.abs(payment.amount - total) < 1 ? 100 : 85;
      
      matches.push({
        type: 'invoice',
        id: invoice.id,
        cislo: invoice.cislo,
        zakaznik: invoice.zakaznikNazev,
        amount: total,
        confidence,
        reason: 'Variabilní symbol = číslo faktury'
      });
    }
  }
  
  // 2. Match to RENTAL by account + amount
  for (const rental of rentals) {
    if (!rental.ucet) continue;
    
    const accountMatch = payment.account.includes(rental.ucet) || 
                        rental.ucet.includes(payment.account);
    const amountMatch = Math.abs(payment.amount - (rental.najem || 0)) < 1;
    
    if (accountMatch && amountMatch) {
      matches.push({
        type: 'rental',
        id: rental.id,
        jmeno: rental.jmeno,
        amount: rental.najem,
        confidence: 95,
        reason: 'Číslo účtu + částka nájmu'
      });
    } else if (accountMatch) {
      matches.push({
        type: 'rental',
        id: rental.id,
        jmeno: rental.jmeno,
        amount: rental.najem,
        confidence: 60,
        reason: 'Pouze číslo účtu'
      });
    }
  }
  
  // 3. Fuzzy match by amount only
  if (matches.length === 0) {
    for (const invoice of invoices.filter(inv => inv.stav !== 'uhrazena')) {
      const total = calcFakturaTotal(invoice.polozky || []).celkem;
      if (Math.abs(payment.amount - total) < 1) {
        matches.push({
          type: 'invoice',
          id: invoice.id,
          cislo: invoice.cislo,
          zakaznik: invoice.zakaznikNazev,
          amount: total,
          confidence: 40,
          reason: 'Pouze částka'
        });
      }
    }
  }
  
  matches.sort((a, b) => b.confidence - a.confidence);
  return matches.length > 0 ? matches[0] : null;
}

  const aiInputRef = useRef(null);

  const [lastFioRequest, setLastFioRequest] = useState(0);
  const [fioCountdown, setFioCountdown] = useState(0);
  
  async function loadTransactions() {
    if (!fioToken) {
      notify('⚠️ Nejdříve zadejte Fio API token', 'error');
      return;
    }
    
    // Throttling ochrana - Fio povoluje max 1 request za 30s
    const now = Date.now();
    const timeSinceLastRequest = (now - lastFioRequest) / 1000;
    const minInterval = 30; // sekund
    
    if (timeSinceLastRequest < minInterval && lastFioRequest > 0) {
      const waitTime = Math.ceil(minInterval - timeSinceLastRequest);
      notify(`⏱️ Počkejte ještě ${waitTime} sekund. Fio API povoluje max 1 požadavek za 30 sekund.`, 'error');
      return;
    }
    
    setLoading(true);
    setLastFioRequest(now);
    
    // Spustit odpočítávání
    let countdown = minInterval;
    const countdownInterval = setInterval(function() {
      countdown--;
      setFioCountdown(countdown);
      if (countdown <= 0) {
        clearInterval(countdownInterval);
        setFioCountdown(0);
      }
    }, 1000);
    
    try {
      const trans = await fetchFioTransactions(
        fioToken, 
        dateFrom,  // Už je ve správném formátu YYYY-MM-DD
        dateTo     // Už je ve správném formátu YYYY-MM-DD
      );
      
      setTransactions(trans);
      autoMatchPayments(trans);
      notify(`✅ Načteno ${trans.length} transakcí z Fio API`);
    } catch (error) {
      const errorMsg = error.message;
      if (errorMsg.includes('409')) {
        notify('❌ Fio API: Příliš mnoho požadavků. Počkejte 30 sekund a zkuste znovu.', 'error');
      } else {
        notify('❌ Chyba při načítání z Fio API: ' + errorMsg, 'error');

    const file = e.target.files[0];

      try {

        autoMatchPayments(trans);
